name: MADS Mobile - Free Fire Asset Scraper

# Se activa manualmente desde la app o el sitio de GitHub (pestaña Actions -> Run workflow)
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python freefire_asset_scraper.py

      - name: Commit and push new assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ log.csv
          git diff --staged --quiet || git commit -m "Auto: assets de Free Fire Wiki (MADS_Mobile)"
          git push
